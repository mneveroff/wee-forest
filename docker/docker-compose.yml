# WeeForest production stack (app only).
# Pair with caddy-compose.yml on the same external Docker network.
services:
  wee_forest_lens:
    image: ${DOCKERHUB_USERNAME:-mneveroff}/wee-forest-lens:${IMAGE_TAG:-latest}
    container_name: wee_forest_lens
    restart: unless-stopped
    env_file: .env

    volumes:
      - ./data/area:/repo/lens/data/area
      - ./data/tiles:/repo/lens/data/tiles

networks:
  default:
    name: ${DOCKER_MY_NETWORK}
    external: true
